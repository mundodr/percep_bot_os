name: Auto Merge

# Auto-enable GitHub auto-merge once Codex Cloud (chatgpt-codex-connector[bot])
# adds a 👍 reaction to the PR. GitHub Actions does NOT have a reaction event,
# so we re-check reactions on every other event the PR fires (push to PR,
# review submitted, comment added) plus a manual workflow_dispatch escape hatch.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to re-check
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    # Skip non-PR issue comments and draft PRs handled later via PR metadata.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      CODEX_BOT: chatgpt-codex-connector
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            issue_comment)      N="${{ github.event.issue.number }}" ;;
            workflow_dispatch)  N="${{ inputs.pr_number }}" ;;
            *)                  N="${{ github.event.pull_request.number }}" ;;
          esac
          echo "number=$N" >> "$GITHUB_OUTPUT"

      - name: Fetch PR metadata
        id: meta
        run: |
          set -euo pipefail
          PR_JSON=$(gh api "repos/$REPO/pulls/${{ steps.pr.outputs.number }}")
          echo "draft=$(echo "$PR_JSON" | jq -r .draft)"   >> "$GITHUB_OUTPUT"
          echo "state=$(echo "$PR_JSON" | jq -r .state)"   >> "$GITHUB_OUTPUT"
          echo "url=$(echo   "$PR_JSON" | jq -r .html_url)" >> "$GITHUB_OUTPUT"

      - name: Poll for Codex Cloud 👍 reaction (max 30 min)
        if: steps.meta.outputs.draft == 'false' && steps.meta.outputs.state == 'open'
        id: check
        run: |
          set -euo pipefail
          PR=${{ steps.pr.outputs.number }}

          # NOTE: GitHub Apps appear in the API as "<slug>[bot]" — match with startswith
          # so we tolerate both "chatgpt-codex-connector" and "chatgpt-codex-connector[bot]".
          count_thumbs() {
            local PR_T COMMENT_T REVIEW_T CID
            # 1) Reactions on the PR description itself
            PR_T=$(gh api -H "Accept: application/vnd.github+json" \
              "repos/$REPO/issues/$PR/reactions" \
              --jq "[.[] | select(.content == \"+1\" and ((.user.login | ascii_downcase) | startswith(\"$CODEX_BOT\")))] | length")

            # 2) Reactions on each PR comment (issue comments)
            COMMENT_T=0
            for CID in $(gh api --paginate "repos/$REPO/issues/$PR/comments" --jq '.[].id'); do
              N=$(gh api "repos/$REPO/issues/comments/$CID/reactions" \
                --jq "[.[] | select(.content == \"+1\" and ((.user.login | ascii_downcase) | startswith(\"$CODEX_BOT\")))] | length")
              COMMENT_T=$((COMMENT_T + N))
            done

            # 3) Reactions on each review comment (inline code reviews)
            REVIEW_T=0
            for CID in $(gh api --paginate "repos/$REPO/pulls/$PR/comments" --jq '.[].id'); do
              N=$(gh api "repos/$REPO/pulls/comments/$CID/reactions" \
                --jq "[.[] | select(.content == \"+1\" and ((.user.login | ascii_downcase) | startswith(\"$CODEX_BOT\")))] | length")
              REVIEW_T=$((REVIEW_T + N))
            done

            echo $((PR_T + COMMENT_T + REVIEW_T))
          }

          # 60 iterations * 30s = 30 min total budget.
          # Bail early as soon as a single 👍 from CODEX_BOT is found.
          MAX_ITERATIONS=60
          INTERVAL=30
          for i in $(seq 1 $MAX_ITERATIONS); do
            # Re-check PR state in case it was closed externally
            STATE=$(gh api "repos/$REPO/pulls/$PR" --jq .state)
            if [ "$STATE" != "open" ]; then
              echo "PR #$PR no longer open (state=$STATE); aborting poll."
              echo "ok=false" >> "$GITHUB_OUTPUT"
              echo "reason=pr_closed" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            TOTAL=$(count_thumbs)
            echo "[$(date -u +%H:%M:%S)] iteration $i/$MAX_ITERATIONS — 👍 from $CODEX_BOT: $TOTAL"

            if [ "$TOTAL" -ge 1 ]; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              echo "reason=found" >> "$GITHUB_OUTPUT"
              echo "Codex 👍 detected on iteration $i; proceeding to enable auto-merge."
              exit 0
            fi

            if [ "$i" -lt "$MAX_ITERATIONS" ]; then
              sleep $INTERVAL
            fi
          done

          echo "ok=false" >> "$GITHUB_OUTPUT"
          echo "reason=timeout" >> "$GITHUB_OUTPUT"

      - name: Enable GitHub auto-merge
        if: steps.check.outputs.ok == 'true'
        run: gh pr merge "${{ steps.meta.outputs.url }}" --auto --squash --delete-branch

      - name: Timed out waiting for Codex
        if: steps.check.outputs.ok != 'true' && steps.check.outputs.reason == 'timeout'
        run: |
          echo "::notice title=Auto-merge gated (timeout)::PR #${{ steps.pr.outputs.number }} polled for 30 min and saw no 👍 from $CODEX_BOT[bot]. Trigger Codex Cloud review, then re-run this workflow manually: Actions tab → 'Auto Merge' → Run workflow → pr_number=${{ steps.pr.outputs.number }}."